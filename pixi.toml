[workspace]
authors = ["Giovanni Dejan <giovanni.dejan@binus.ac.id>"]
channels = ["conda-forge"]
name = "python-pixi-template"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
start = "python3 main.py"
lint-ci = "ruff check ."
lint-fix = "ruff check . --fix"
type-check = "mypy ."

[dependencies]
python = ">=3.13,<3.14"
mypy = ">=1.19.1,<2"
ruff = ">=0.15.5,<0.16"
pytest = ">=9.0.2,<10"
pre-commit = ">=4.5.1,<5"
numpy = ">=2.5.0,<3"
matplotlib = ">=3.11.0,<4"
pillow = ">=12.2.0,<13"

[pypi-dependencies]
mcp-pypi = ">=3.0.0, <4"
pyqt6 = ">=6.9.1, <7"
